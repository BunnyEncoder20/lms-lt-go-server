services:
  lms-lt-go-server:
    container_name: lms-lt-go-server
    build:
      context: .
      dockerfile: Dockerfile # Standard capitalization
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - DB_URL=data/local_lms.db
      - APP_ENV=development # Triggers your JSON logger!
      - JWT_SECRET=${JWT_SECRET:-your-secret-key}

    # Map a persistent volume so your SQLite data survives restarts!
    volumes:
      - lms_data:/app/data # Maps the named volume to your container's working directory

    deploy:
      resources:
        limits:
          memory: 500M # might need some more mem for large excel files

    restart: unless-stopped

# Declare the named volume at the bottom of the file
volumes:
  lms_data:
