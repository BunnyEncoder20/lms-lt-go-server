version: "2"
sql:
  - schema: "schema.sql"
    queries: "query.sql"
    engine: "sqlite"
    gen:
      go:
        package: "db"
        out: "internal/database/db"
        emit_json_tags: true
        overrides:
          # 1. Default EVERYTHING ending in id or _id to standard UUID
          - column: "*.id"
            go_type: "github.com/google/uuid.UUID"

          # 2. Specifically override only the OPTIONAL ones to NullUUID
          - column: "users.is_id"
            go_type: "github.com/google/uuid.NullUUID"
          - column: "users.ns_id"
            go_type: "github.com/google/uuid.NullUUID"
          - column: "users.dh_id"
            go_type: "github.com/google/uuid.NullUUID"
          - column: "courses.author_id"
            go_type: "github.com/google/uuid.NullUUID"
          - column: "course_assignments.user_id"
            go_type: "github.com/google/uuid.NullUUID"
          - column: "course_assignments.assigned_by_id"
            go_type: "github.com/google/uuid.NullUUID"
          - column: "training_calendar_plans.actual_training_id"
            go_type: "github.com/google/uuid.NullUUID"

          # 3. All other forrign keys are required
          - column: "*.*_id"
            go_type: "github.com/google/uuid.UUID"

          # 4 All the enums should be mapped to predetermined costum types
          - column: "users.role"
            go_type: "go-server/internal/models.Role"
          - column: "trainings.category"
            go_type: "go-server/internal/models.TrainingCategory"
          - column: "nominations.status"
            go_type: "go-server/internal/models.NominationStatus"
          - column: "courses.status"
            go_type: "go-server/internal/models.CourseStatus"
          - column: "courses.category"
            go_type: "go-server/internal/models.TrainingCategory"
          - column: "lessons.content_type"
            go_type: "go-server/internal/models.LessonContentType"
          - column: "course_assignments.status"
            go_type: "go-server/internal/models.CourseAssignmentStatus"
          - column: "training_calendar_plans.status"
            go_type: "go-server/internal/models.CalendarPlanStatus"
          - column: "trainings.mode_of_delivery"
            go_type: "go-server/internal/models.DeliveryMode"
