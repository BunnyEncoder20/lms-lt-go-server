services:
  api-offline:
    build:
      context: .
      dockerfile: Dockerfile.offline
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - DB_URL=local_lms.db
      - JWT_SECRET=${JWT_SECRET:-your-secret-key}
    deploy:
      resources:
        limits:
          memory: 100M
    restart: unless-stopped
